- name: Install Python3, pip and Git
  ansible.builtin.dnf:
    name:
      - "{{ python_version }}"
      - "{{ python_version }}-pip"
      - git
    state: present

- name: Clone app repo
  ansible.builtin.git:
    repo: "{{ app_repo }}"
    dest: "{{ app_dir }}"
    force: yes

- name: Install app dependencies
  ansible.builtin.pip:
    requirements: "{{ app_dir }}/requirements.txt"
    virtualenv: "{{ app_dir }}/venv"
    virtualenv_command: "{{ python_version }} -m venv"

- name: Deploy systemd service
  ansible.builtin.template:
    src: app.service.j2
    dest: /etc/systemd/system/cap2.service
    mode: '0644'

- name: Start and enable app service
  ansible.builtin.systemd_service:
    name: cap2
    state: started
    enabled: yes
    daemon_reload: yes