name: Ansible Deploy Cap2

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "ansible/**"
      - ".github/workflows/ansible-deploy.yml"

jobs:
  ansible:
    name: Ansible Deployment
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-1

      - name: Test Ansible Connection
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
        working-directory: ansible
        run: ansible -i inventories/hosts.ini app -m ansible.builtin.ping

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/mickey.pem
          chmod 600 ~/.ssh/mickey.pem

      - name: Run Ansible Playbook
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
        run: ansible-playbook -i inventories/hosts.ini playbook.yml
        working-directory: ansible

      - name: Check app status
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
        run: ansible -i ansible/inventories/hosts.ini app -m ansible.builtin.shell -a "systemctl status cap2"