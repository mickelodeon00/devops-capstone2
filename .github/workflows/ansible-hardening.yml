name: Ansible Hardening Cap2

on:
  workflow_dispatch:

jobs:
  hardening:
    name: CIS Hardening
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-1

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/mickey.pem
          chmod 600 ~/.ssh/mickey.pem

      - name: Install CIS Role
        working-directory: ansible
        run: ansible-galaxy install -r requirements.yml

      - name: Run Hardening Playbook
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
        working-directory: ansible
        run: ansible-playbook -i inventories/hosts.ini hardening.yml